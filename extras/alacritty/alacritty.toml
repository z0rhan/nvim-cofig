# Alacritty Configuration File (TOML format)

# Window settings
[window]
  opacity = 0.8
  blur = false
  dimensions= {columns = 120,lines = 28}

# Font settings
[font]
  normal = { family = "Fira Mono Nerd Font", style = "Regular" }
  bold = { family = "MesloLGM Nerd Font", style = "Bold" }
  italic = { family = "MesloLGM Nerd Font", style = "Italic" }
  bold_italic = { family = "MesloLGM Nerd Font", style = "Bold Italic" }
  size = 11.0

# Key bindings
[keyboard]
  bindings = [{ key = "F11", action = "ToggleFullscreen" }]

# Scrolling settings
[scrolling]
  history = 10000
  multiplier = 3

## Colors (Gruvbox Material Hard Dark)
#
## Default colors
#[colors.primary]
#background = '#1d2021'
#foreground = '#d4be98'
#
## Normal colors
#[colors.normal]
#black   = '#32302f'
#red     = '#ea6962'
#green   = '#a9b665'
#yellow  = '#d8a657'
#blue    = '#7daea3'
#magenta = '#d3869b'
#cyan    = '#89b482'
#white   = '#d4be98'
#
## Bright colors (same as normal colors)
#[colors.bright]
#black   = '#32302f'
#red     = '#ea6962'
#green   = '#a9b665'
#yellow  = '#d8a657'
#blue    = '#7daea3'
#magenta = '#d3869b'
#cyan    = '#89b482'
#white   = '#d4be98'
