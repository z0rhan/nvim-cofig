format = """
[оӮ¶](#3B4252)\
$username\
[оӮ°](bg:#434C5E fg:#3B4252)\
$directory\
[оӮ°](fg:#434C5E bg:#4C566A)\
$git_branch\
$git_status\
[оӮ°](fg:#4C566A bg:#86BBD8)\
[оӮ°](fg:#86BBD8 bg:#06969A)\
$docker_context\
[оӮ°](fg:#06969A bg:#33658A)\
$time\
[оӮҙ ](fg:#33658A)\
$fill\
$python\
$c\
$elixir\
$elm\
$golang\
$haskell\
$java\
$julia\
$nodejs\
$nim\
$rust\
$line_break\
$character\
"""
command_timeout = 5000
# Disable the blank line at the start of the prompt
add_newline = false

# You can also replace your username with a neat symbol like п„  to save some space
[fill]
symbol = " "        # Default symbol

[character]
success_symbol = " вң—"       # Symbol for successful commands
error_symbol = " вң—"         # Symbol for failed commands

#$username\
[username]
show_always = true
style_user = "bg:#3B4252"
style_root = "bg:#3B4252"
format = '[$user ]($style)'
#[$arch_symbol]

[env_var]
variable = "arch_symbol"
value= "пҢғ "

[directory]
style = "bg:#434C5E"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "вҖҰ/"

# Here is how you can shorten some long paths by text replacement
# similar to mapped_locations in Oh My Posh:
[directory.substitutions]
"Documents" = "у°Ҳҷ "
"Downloads" = "пҖҷ "
"Music" = "пҖҒ "
"Pictures" = "пҖҫ "
# Keep in mind that the order matters. For example:
# "Important Documents" = " пңҳп„Ә "
# will not be replaced, because "Documents" was already substituted before.
# So either put "Important Documents" before "Documents" or use the substituted version:
# "Important пңҳ " = " пңҳп„Ә "

[python]
style = 'teal'
symbol = 'оҲө '
format = '[${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'
pyenv_version_name = true
pyenv_prefix = ''

[c]
symbol = "оҳһ "
style = "bg:#86BBD8"
format = '[ $symbol ($version) ]($style)'

[docker_context]
symbol = "пҢҲ "
style = "bg:#06969A"
format = '[ $symbol $context ]($style) $path'

[elixir]
symbol = "оүө "
style = "bg:#86BBD8"
format = '[ $symbol ($version) ]($style)'

[elm]
symbol = "оҳ¬ "
style = "bg:#86BBD8"
format = '[ $symbol ($version) ]($style)'

[git_branch]
symbol = "п„“"
style = "bg:#4C566A"
format = '[ $symbol $branch ]($style)'

[git_status]
style = "bg:#4C566A"
format = '[$all_status$ahead_behind ]($style)'

[golang]
symbol = "оҳ§ "
style = "bg:#86BBD8"
format = '[ $symbol ($version) ]($style)'

[haskell]
symbol = "оқ· "
style = "bg:#86BBD8"
format = '[ $symbol ($version) ]($style)'

[java]
symbol = "оү– "
style = "bg:#86BBD8"
format = '[ $symbol ($version) ]($style)'

[julia]
symbol = "оҳӨ "
style = "bg:#86BBD8"
format = '[ $symbol ($version) ]($style)'

[nodejs]
symbol = "оңҳ"
style = "bg:#86BBD8"
format = '[ $symbol ($version) ]($style)'

[nim]
symbol = "пҡӨ "
style = "bg:#86BBD8"
format = '[ $symbol ($version) ]($style)'

#[python]
#style = "bg:#3B4252"
#format = '[(\($virtualenv\) )]($style)'

[rust]
symbol = "оһЁ"
style = "bg:#86BBD8"
format = '[ $symbol ($version) ]($style)'

[time]
disabled = false
time_format = "%R" # Hour:Minute Format
style = "bg:#33658A"
format = '[ $time ]($style)'
